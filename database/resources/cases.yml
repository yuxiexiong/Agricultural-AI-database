    resource_ids: ["RES-0041"]
    case_type: "commercial_ecosystem"
    region: ["global"]
    scenario_ids: ["SCENARIO-006", "SCENARIO-010"]
    technologies: ["precision_agriculture", "guidance", "farm_management", "data_platform"]
    value_claim_zh: "以定位、导航、农机和数据工作流为基础，体现精准农业的基础设施属性。"
    reusable_angle_zh: "很多农业 AI 项目需要先接入定位、作业记录和农机数据，而不是直接训练模型。"
    caveats_zh: "产品线复杂，引用时应指向具体页面和具体能力。"

  - id: "CASEDB-009"
