    resource_ids: ["RES-0046"]
    case_type: "public_risk_platform"
    region: ["global"]
    scenario_ids: ["SCENARIO-009", "SCENARIO-011"]
    technologies: ["remote_sensing", "climate_risk", "vulnerability_data"]
    value_claim_zh: "把灾害、暴露度和脆弱性数据整合进地图化风险监测。"
