    value_claim_zh: "把海量公开遥感数据和云端计算结合，显著降低遥感 AI 原型验证门槛。"
    reusable_angle_zh: "咨询项目可以先用云端地理空间平台验证信号，再决定是否建设自有平台。"
    caveats_zh: "正式商用需评估许可、配额、成本和数据出境/合规问题。"

  - id: "CASEDB-010"
    name: "WFP PRISM"
