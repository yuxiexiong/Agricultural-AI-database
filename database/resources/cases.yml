    resource_ids: ["RES-0042"]
    case_type: "commercial_product"
    region: ["us"]
    scenario_ids: ["SCENARIO-003", "SCENARIO-012"]
    technologies: ["computer_vision", "robotics", "precision_application"]
    value_claim_zh: "用视觉识别和激光执行构成非化学除草路径，适合讲农业机器人和投入品替代。"
    reusable_angle_zh: "当 AI 连接到物理执行器，农业智能化会从建议系统进入自动作业阶段。"
    caveats_zh: "设备成本、作物适配和作业速度是商业化评估重点。"

  - id: "CASEDB-008"
    name: "Trimble Agriculture"
