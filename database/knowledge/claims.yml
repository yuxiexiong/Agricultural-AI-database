version: "0.1"
updated_at: "2026-07-01"

claims:
  - id: "CLAIM-001"
    claim_zh: "农业 AI 的瓶颈往往不是单个模型，而是跨来源数据能否被稳定采集、治理、连接到农事工作流。"
    evidence_level: "strong"
    resource_ids: ["RES-0003", "RES-0008", "RES-0023", "RES-0030"]
    use_for: ["consulting_report", "content_ip", "technology_selection"]
    content_angle_zh: "适合作为报告开场或短视频观点：农业 AI 不是先买模型，而是先让数据流动起来。"
    caution_zh: "不要把这个观点绝对化；在视觉识别等局部任务中，模型能力仍然重要。"

  - id: "CLAIM-002"
    claim_zh: "遥感数据适合做广域、低成本、连续监测，但地块级决策通常还需要气象、土壤、农事记录和地面样本补足。"
    evidence_level: "strong"
    resource_ids: ["RES-0014", "RES-0015", "RES-0017", "RES-0020", "RES-0034"]
    use_for: ["consulting_report", "technology_selection", "content_ip"]
    content_angle_zh: "适合解释为什么农业 AI 平台不能只靠卫星图。"
    caution_zh: "如果客户只需要区域监测，不一定需要高成本地面数据。"

  - id: "CLAIM-003"
    claim_zh: "精准喷洒和变量作业是农业 AI 中 ROI 较容易被理解的场景，因为模型输出可以直接连接到投入品节省。"
    evidence_level: "moderate"
    resource_ids: ["RES-0024", "RES-0042"]
    use_for: ["roi_model", "benchmark_case", "content_ip"]
    content_angle_zh: "适合做案例拆解：AI 不是只给建议，而是控制喷头、激光或机械执行器。"
    caution_zh: "具体节省比例必须以企业官方说明、试点数据或客户实测为准。"

  - id: "CLAIM-004"
    claim_zh: "农业数据空间和互操作标准会决定农业 AI 能否从单点工具升级为行业基础设施。"
    evidence_level: "strong"
    resource_ids: ["RES-0008", "RES-0021", "RES-0022", "RES-0023", "RES-0040"]
    use_for: ["consulting_report", "data_architecture", "technology_selection"]
    content_angle_zh: "适合写平台战略：真正的壁垒不是一个模型，而是数据标准和生态连接能力。"
    caution_zh: "标准本身不能保证商业成功，还需要激励、接口和治理机制。"

  - id: "CLAIM-005"
    claim_zh: "生成式 AI 在农业中的安全边界应当先定位为检索、解释、辅助和分诊，而不是未经审核的自动处方。"
    evidence_level: "moderate"
    resource_ids: ["RES-0032", "RES-0033", "RES-0044", "RES-0045"]
    use_for: ["risk_control", "content_ip", "technology_selection"]
    content_angle_zh: "适合做反方观点：农业大模型不能把高风险建议说得像万能答案。"
    caution_zh: "不同国家对农药、兽药、金融建议等监管不同，正式交付前需做本地合规核验。"

  - id: "CLAIM-006"
    claim_zh: "气候风险正在把农业 AI 的价值从田间生产扩展到采购、库存、供应链和金融风控。"
    evidence_level: "moderate"
    resource_ids: ["RES-0002", "RES-0010", "RES-0018", "RES-0026", "RES-0046"]
    use_for: ["market_context", "consulting_report", "content_ip"]
    content_angle_zh: "适合写趋势判断：农业 AI 的客户不只是农场，也包括食品企业、贸易商、保险和政府。"
    caution_zh: "气候预测必须以概率和情景方式表达，避免确定性承诺。"

  - id: "CLAIM-007"
    claim_zh: "低成本边缘 AI 和 TinyML 适合小农户和弱网络环境，但落地成败取决于维护、供电、连接和服务网络。"
    evidence_level: "moderate"
    resource_ids: ["RES-0031"]
    use_for: ["technology_selection", "content_ip", "risk_control"]
    content_angle_zh: "适合解释为什么便宜硬件不是完整方案，农业 AI 还需要运维体系。"
    caution_zh: "论文和原型不能直接代表规模化商业部署能力。"

  - id: "CLAIM-008"
    claim_zh: "农业 AI 的第一阶段试点应优先选择数据闭环短、价值指标清楚、专家可复核的场景。"
    evidence_level: "strong"
    resource_ids: ["RES-0003", "RES-0025", "RES-0027", "RES-0030"]
    use_for: ["consulting_report", "roi_model", "risk_control"]
    content_angle_zh: "适合做实施建议：先做可验收的小闭环，再讲平台和大模型。"
    caution_zh: "如果甲方已有成熟数据平台，可更快进入跨场景整合。"

  - id: "CLAIM-009"
    claim_zh: "农业 AI 内容/IP 最容易破圈的表达，是把抽象技术翻译成节水、少打药、稳产、少损失、少弯路。"
    evidence_level: "moderate"
    resource_ids: ["RES-0016", "RES-0024", "RES-0025", "RES-0042"]
    use_for: ["content_ip", "roi_model"]
    content_angle_zh: "适合做选题和销售话术：少讲参数，多讲农户和企业能少浪费什么。"
    caution_zh: "传播表达可以通俗，但不能虚构效果数字。"

  - id: "CLAIM-010"
    claim_zh: "公共数据源能降低农业 AI 原型成本，但正式商业系统仍要解决许可、稳定性、更新频率和本地适配。"
    evidence_level: "strong"
    resource_ids: ["RES-0014", "RES-0015", "RES-0017", "RES-0043", "RES-0040"]
    use_for: ["technology_selection", "risk_control", "consulting_report"]
    content_angle_zh: "适合提醒客户：公开数据是起点，不是完整产品。"
    caution_zh: "部分公共数据允许研究使用但商业使用条件不同，需逐项核验。"

  - id: "CLAIM-011"
    claim_zh: "高质量农业 AI 资料库应把宏观统计、空间数据、经营数据、词表标准和场景知识分层管理，单一资料来源无法覆盖完整决策链。"
    evidence_level: "strong"
    resource_ids: ["RES-0047", "RES-0051", "RES-0052", "RES-0054", "RES-0049"]
    use_for: ["consulting_report", "data_architecture", "technology_selection"]
    content_angle_zh: "适合解释为什么数据库需要分层：国家/区域看 FAO/USDA，空间适宜性看 GAEZ/遥感，经营 ROI 看 ARMS，语义互操作看 NALT/AGROVOC。"
    caution_zh: "分层管理不等于所有数据都可直接合并，必须处理尺度、口径、许可和更新频率差异。"

  - id: "CLAIM-012"
    claim_zh: "水资源和灌溉是农业 AI 最适合用遥感数据形成闭环的场景之一，因为蒸散发、水生产力和作物状态可以被持续观测。"
    evidence_level: "strong"
    resource_ids: ["RES-0016", "RES-0048", "RES-0017", "RES-0018"]
    use_for: ["roi_model", "technology_selection", "content_ip"]
    content_angle_zh: "适合写智能灌溉内容：不是先卖传感器，而是先建立 ET、天气、作物阶段和地块管理的水分决策闭环。"
    caution_zh: "遥感 ET 仍需要本地灌溉制度、土壤和农艺规则校准，不能直接替代田间管理。"

  - id: "CLAIM-013"
    claim_zh: "农业大模型真正进入生产决策，需要把公共科研知识、可机器读取的数据和产品化流程连接起来，而不是只做通用问答。"
    evidence_level: "moderate"
    resource_ids: ["RES-0056", "RES-0032", "RES-0033", "RES-0044", "RES-0045"]
    use_for: ["content_ip", "technology_selection", "risk_control"]
    content_angle_zh: "适合用于农业大模型章节：农业 AI 的关键不是会说，而是能把科研、数据、农艺规则和现实决策连接成产品。"
    caution_zh: "CGIAR AI Hub 是公共科研与产品化方向案例，不能直接代表所有商业农业大模型的成熟度。"

  - id: "CLAIM-014"
    claim_zh: "智能灌溉的高质量数据底座应把 ET、作物需水、地面水文、地下水储量和干旱监测分层组合，而不是只看单一传感器或单一影像指标。"
    evidence_level: "strong"
    resource_ids: ["RES-0016", "RES-0048", "RES-0057", "RES-0058", "RES-0059", "RES-0060", "RES-0062"]
    use_for: ["roi_model", "consulting_report", "technology_selection"]
    content_angle_zh: "适合写智能灌溉方案：先建立水分决策链，再讨论传感器、模型和灌溉设备。"
    caution_zh: "跨区域使用时必须区分美国数据、全球遥感数据和本地水权/取水制度，不能把数据可得性等同于可执行建议。"

  - id: "CLAIM-015"
    claim_zh: "作物长势监测和产量预测更适合采用多源校验：遥感时间序列给空间信号，作物历和农业气象给生育阶段，官方进度/产量统计给回测口径。"
    evidence_level: "strong"
    resource_ids: ["RES-0013", "RES-0014", "RES-0015", "RES-0063", "RES-0064", "RES-0065", "RES-0066", "RES-0077"]
    use_for: ["consulting_report", "technology_selection", "monthly_intelligence"]
    content_angle_zh: "适合解释为什么产量预测不是单张卫星图分类，而是多源时间序列和口径校验。"
    caution_zh: "官方统计通常是区域尺度，不能直接作为地块级标签；地块级预测仍需本地样本和边界数据。"

  - id: "CLAIM-016"
    claim_zh: "区域作物适宜性和农业投资选址不能只看自然适宜性；还要叠加现实生产格局、土地覆盖、基础设施、市场和农村家庭约束。"
    evidence_level: "strong"
    resource_ids: ["RES-0049", "RES-0069", "RES-0070", "RES-0071", "RES-0072"]
    use_for: ["consulting_report", "market_context", "technology_selection"]
    content_angle_zh: "适合写投资选址章节：哪里能种是一层，哪里值得投是另一层。"
    caution_zh: "公开宏观和空间数据只能做初筛，不能替代土地权属、政策、物流、用工和客户访谈尽调。"

  - id: "CLAIM-017"
    claim_zh: "农业 AI ROI 评估应从成本、价格、收入、投入品和生产率基准出发，再测试技术改善假设，而不是直接套用企业宣传中的节省比例。"
    evidence_level: "strong"
    resource_ids: ["RES-0051", "RES-0052", "RES-0073", "RES-0074", "RES-0075", "RES-0076", "RES-0077", "RES-0078"]
    use_for: ["roi_model", "consulting_report", "risk_control"]
    content_angle_zh: "适合做 ROI 模型开场：先问这类农场的钱花在哪里、收入来自哪里、价格波动多大，再讨论 AI 能改善哪一项。"
    caution_zh: "USDA 数据主要适用于美国；跨国项目必须寻找本地成本、价格和经营数据替代。"

  - id: "CLAIM-018"
    claim_zh: "农场管理平台和农机互操作的长期价值取决于地理要素、传感器观测、元数据和作业记录能否按标准沉淀，而不只是能接入一个设备或一个 App。"
    evidence_level: "strong"
    resource_ids: ["RES-0021", "RES-0022", "RES-0023", "RES-0040", "RES-0079", "RES-0080", "RES-0081", "RES-0082"]
    use_for: ["data_architecture", "technology_selection", "consulting_report"]
    content_angle_zh: "适合写数据底座观点：平台早期省掉元数据和接口标准，后期会在多品牌、多地块、多模型扩展时还债。"
    caution_zh: "标准只能降低技术摩擦，不能自动解决数据权属、商业激励和供应商封闭生态问题。"
