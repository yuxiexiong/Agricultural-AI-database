version: "0.1"
updated_at: "2026-07-01"

roi_models:
  - id: "ROI-001"
    name_zh: "精准喷洒与变量作业 ROI"
    scenario_ids: ["SCENARIO-003", "SCENARIO-012"]
    resource_ids: ["RES-0024", "RES-0042", "RES-0083", "RES-0088"]
    value_driver_zh: "把识别结果连接到喷头、激光或变量处方，主要价值来自投入品节省、作业效率和环境/合规收益。"
    baseline_metrics: ["用药量", "药剂成本", "作业面积", "作业时长", "漏喷率", "误伤率", "杂草或病虫压力"]
    improvement_levers: ["减少非目标区域施药", "降低重复作业", "提高处方图和机器执行一致性", "形成可追溯作业记录"]
    formula_zh: "年度净收益 = 投入品节省 + 作业效率收益 + 质量/合规收益 - 设备折旧 - 软件费用 - 运维与培训成本。"
    acceptance_metrics: ["每公顷投入品成本变化", "目标识别准确率", "漏检/误伤记录", "作业吞吐量", "处方执行记录完整率"]
    risk_boundary_zh: "不能只引用企业宣传中的节省比例；必须按作物、药剂、杂草压力、作业速度和设备价格重算。"

  - id: "ROI-002"
    name_zh: "智能灌溉与水资源管理 ROI"
    scenario_ids: ["SCENARIO-001"]
    resource_ids: ["RES-0016", "RES-0048", "RES-0057", "RES-0094", "RES-0096", "RES-0097"]
    value_driver_zh: "核心价值来自减少过度灌溉、降低水电和施肥浪费、稳产，以及满足水资源管理或企业水目标。"
    baseline_metrics: ["灌溉水量", "水价或抽水能耗", "作物产量", "品质指标", "灌溉次数", "土壤湿度", "ET 或水生产力"]
    improvement_levers: ["ET/天气/土壤湿度联动", "按作物阶段调整灌溉", "异常水分胁迫预警", "灌溉控制器或农户执行闭环"]
    formula_zh: "年度净收益 = 节水收益 + 能耗节省 + 产量/品质改善 + 合规或水权收益 - 传感器/平台/运维成本。"
    acceptance_metrics: ["单位产量耗水", "灌溉建议采纳率", "ET 与地面观测一致性", "作物胁迫天数", "水费或抽水能耗变化"]
    risk_boundary_zh: "无水价、无取水限制或执行率低的地区，节水不一定能转化为现金 ROI。"

  - id: "ROI-003"
    name_zh: "作物长势监测与产量预测 ROI"
    scenario_ids: ["SCENARIO-004", "SCENARIO-008", "SCENARIO-009"]
    resource_ids: ["RES-0011", "RES-0014", "RES-0015", "RES-0063", "RES-0064", "RES-0084", "RES-0085", "RES-0099"]
    value_driver_zh: "价值来自更早发现异常、更准确安排采购/库存/销售，以及减少人工巡田和灾损核验成本。"
    baseline_metrics: ["历史产量误差", "巡田频次和成本", "异常发现时间", "采购或库存偏差", "灾损评估周期"]
    improvement_levers: ["多源遥感时间序列", "无人机/高分影像补足细节", "气象和作物历校正", "官方统计或历史标签回测"]
    formula_zh: "年度净收益 = 决策误差降低收益 + 人工巡检节省 + 灾损/异常提前处理收益 - 数据采购与模型运维成本。"
    acceptance_metrics: ["MAPE/RMSE", "异常发现提前天数", "人工巡田小时数变化", "预测版本留痕", "地面抽样复核通过率"]
    risk_boundary_zh: "区域级预测不能直接承诺地块级准确率；必须说明尺度和标签口径。"

  - id: "ROI-004"
    name_zh: "农场管理平台与数据底座 ROI"
    scenario_ids: ["SCENARIO-006", "SCENARIO-010", "SCENARIO-014"]
    resource_ids: ["RES-0027", "RES-0028", "RES-0089", "RES-0090", "RES-0095", "RES-0098", "RES-0100"]
    value_driver_zh: "短期价值来自记录、协作、合规和报表效率；长期价值来自可复用数据资产和后续模型接入。"
    baseline_metrics: ["农事记录完整率", "录入耗时", "报表生成耗时", "作业记录缺失率", "多人协作成本", "合规检查成本"]
    improvement_levers: ["地块/作物/农事记录标准化", "移动端和服务商协作", "农机/遥感/IoT 接入", "经营与财务数据联动"]
    formula_zh: "年度净收益 = 人工记录节省 + 报告与合规效率收益 + 决策改善收益 - 订阅费 - 数据治理和培训成本。"
    acceptance_metrics: ["核心字段完整率", "月活跃使用率", "报表交付周期", "接口成功率", "用户角色覆盖率"]
    risk_boundary_zh: "数据平台 ROI 往往是间接收益，不能只用增产承诺衡量；先验收数据闭环和流程效率。"

  - id: "ROI-005"
    name_zh: "农机数据接入与互操作 ROI"
    scenario_ids: ["SCENARIO-006", "SCENARIO-010"]
    resource_ids: ["RES-0021", "RES-0022", "RES-0023", "RES-0041", "RES-0079", "RES-0080", "RES-0083"]
    value_driver_zh: "价值来自减少重复录入、提高作业记录质量、支持变量作业和跨品牌设备数据汇总。"
    baseline_metrics: ["机器作业记录完整率", "人工导入次数", "字段映射错误率", "变量处方执行率", "跨设备数据延迟"]
    improvement_levers: ["ISO 11783/ISOBUS", "ADAPT 数据模型", "设备遥测接入", "作业质量规则和异常检测"]
    formula_zh: "年度净收益 = 录入与整理节省 + 作业分析收益 + 变量作业收益 - 接口开发 - 兼容性测试 - 支持成本。"
    acceptance_metrics: ["设备接入成功率", "关键字段映射率", "作业记录延迟", "异常数据占比", "多品牌覆盖数量"]
    risk_boundary_zh: "互操作标准降低技术摩擦，但不能自动解决供应商封闭生态和数据权属。"

  - id: "ROI-006"
    name_zh: "区域作物适宜性与农业投资选址 ROI"
    scenario_ids: ["SCENARIO-013"]
    resource_ids: ["RES-0047", "RES-0049", "RES-0069", "RES-0070", "RES-0071", "RES-0072"]
    value_driver_zh: "价值来自降低前期尽调成本、缩小候选区域、识别水土气候和基础设施约束。"
    baseline_metrics: ["候选区域数量", "尽调成本", "作物适宜性等级", "市场接入时间", "水土约束", "政策或基础设施限制"]
    improvement_levers: ["GAEZ/土壤/气候叠加", "土地覆盖和现实生产格局校验", "市场和基础设施数据加权", "情景分析"]
    formula_zh: "项目价值 = 避免错误选址损失 + 尽调效率收益 + 优先区域机会收益 - 数据处理和专家尽调成本。"
    acceptance_metrics: ["机会地图可解释性", "候选区排序稳定性", "约束清单完整率", "专家复核一致性", "数据来源覆盖率"]
    risk_boundary_zh: "中宏观适宜性只能做初筛，不能替代土地权属、政策、物流和客户访谈尽调。"

  - id: "ROI-007"
    name_zh: "农场经营基准与 ROI 评估"
    scenario_ids: ["SCENARIO-014"]
    resource_ids: ["RES-0051", "RES-0052", "RES-0073", "RES-0074", "RES-0075", "RES-0076", "RES-0077", "RES-0100"]
    value_driver_zh: "价值来自用权威经营和成本基准校准技术假设，避免把供应商案例直接外推到客户农场。"
    baseline_metrics: ["农场规模", "收入结构", "成本结构", "投入品价格", "劳动力成本", "历史产量", "价格波动"]
    improvement_levers: ["按作物和区域建立基准", "区分固定成本和变动成本", "做敏感性分析", "把采用率和执行率纳入模型"]
    formula_zh: "ROI = (技术带来的年化增益 - 年化总成本) / 年化总成本；增益需要拆到收入、成本、风险和效率项。"
    acceptance_metrics: ["假设来源覆盖率", "敏感性区间", "地域口径标注", "客户实际数据替换率", "回收期"]
    risk_boundary_zh: "USDA 等美国数据不能直接迁移到其他国家；跨国项目必须寻找本地基准。"

  - id: "ROI-008"
    name_zh: "气候风险与供应链韧性 ROI"
    scenario_ids: ["SCENARIO-007", "SCENARIO-009", "SCENARIO-011"]
    resource_ids: ["RES-0026", "RES-0091", "RES-0018", "RES-0046"]
    value_driver_zh: "价值来自提前识别产区风险、调整采购和库存、支持保险/金融辅助风控与韧性投资。"
    baseline_metrics: ["历史损失", "供应商集中度", "库存缺口", "采购价格波动", "灾害响应时间", "区域风险暴露"]
    improvement_levers: ["概率预测", "供应商地理映射", "作物历和关键窗口识别", "风险预案和替代产区设计"]
    formula_zh: "年度净收益 = 避免损失期望值 + 采购/库存优化收益 + 风险响应效率收益 - 数据和分析服务成本。"
    acceptance_metrics: ["风险提前预警天数", "情景覆盖率", "供应商地理编码率", "预案触发记录", "预测校准度"]
    risk_boundary_zh: "气候风险必须以概率和情景表达，不能把模型输出包装成确定性预言。"

  - id: "ROI-009"
    name_zh: "农艺侦察与服务工作流 ROI"
    scenario_ids: ["SCENARIO-002", "SCENARIO-005", "SCENARIO-006"]
    resource_ids: ["RES-0084", "RES-0090", "RES-0093", "RES-0098"]
    value_driver_zh: "价值来自提高农艺师覆盖面积、缩短发现到建议的周期、提升客户沟通和报告效率。"
    baseline_metrics: ["单名农艺师服务面积", "巡田小时", "报告生成时间", "问题闭环时长", "客户留存", "专家复核工作量"]
    improvement_levers: ["移动侦察", "图像识别", "标准化建议和报告", "历史地块记录", "专家审核入口"]
    formula_zh: "年度净收益 = 服务效率收益 + 客户留存或增购收益 + 误判减少收益 - 平台费用 - 培训和复核成本。"
    acceptance_metrics: ["侦察任务完成率", "报告交付周期", "专家复核通过率", "建议采纳率", "客户服务覆盖变化"]
    risk_boundary_zh: "不能把识别/建议工具升级为未经专家确认的自动处方。"

  - id: "ROI-010"
    name_zh: "设施农业与温室 AI ROI"
    scenario_ids: ["SCENARIO-001", "SCENARIO-004", "SCENARIO-006"]
    resource_ids: ["RES-0092"]
    value_driver_zh: "价值来自受控环境下更短的数据闭环：产量预测、灌溉控制、栽培计划和运营看板更容易形成反馈。"
    baseline_metrics: ["产量预测误差", "灌溉和营养液使用", "采收计划偏差", "人工调控次数", "能源和水耗", "作物品质"]
    improvement_levers: ["温室传感数据", "栽培计划模型", "产量预测", "灌溉控制", "运营异常预警"]
    formula_zh: "年度净收益 = 产量/品质改善 + 资源使用节省 + 运营排程收益 - 软件费用 - 集成与培训成本。"
    acceptance_metrics: ["预测误差", "资源单耗", "采收计划准确率", "控制建议采纳率", "异常响应时间"]
    risk_boundary_zh: "温室 AI 的闭环优势不能直接外推到露天大田。"
